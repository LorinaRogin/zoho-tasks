<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Group Selectors</title>
    <style>
        h1 {
            color: green;
        }

        p {
            color: purple;
        }

        h1,
        p {
            margin: 5px;
        }
    </style>
</head>

<body>
    <h1>A</h1>
    <h1>B</h1>
    <h1>C</h1>
    <p>1</p>
    <p>2</p>
    <p>3</p>
</body>

</html>
