<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .container {
            display: flex;
            width: 500px;
            height: 200px;
            border: 2px solid black;

            flex-direction: row;
            justify-content: center;
        }

        .box {
            width: 60px;
            height: 60px;
            background: blueviolet;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="box">A</div>
        <div class="box">B</div>
        <div class="box">C</div>
    </div>
</body>

</html>
