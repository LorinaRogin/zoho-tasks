<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Styled Buttons</title>
    <style>
        .one{
            background-color: darkseagreen;
            border-radius:2px;
            padding:5px;
            display:block;
        }
        .one:hover{
            background-color: greenyellow;
        }
        .two{
            background-color:crimson;
            border-radius:3px;
            padding: 6px;
            cursor: pointer;
            margin-top: 20px;
            display: block;
        }
        .two:hover{
            background-color:darkgrey
        }
        .three{
            background-color: cyan;
            border-radius:10px;
            padding:10px;
            cursor:pointer;
            margin-top: 30px;
        }
        .three:hover{
            background-color: cadetblue;
        }
    </style>
</head>
<body>
    <button class="one">Click here</button>
    <button class="two">Press</button>
    <button class="three">Login</button>
</body>
</html>
