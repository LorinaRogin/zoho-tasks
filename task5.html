<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Card Component</title>
    <style>
        .card{
            width:20%;
            background-color: cadetblue;
            height:250px;
            padding: 25px;
            margin: 10px;
            box-shadow: color(srgb rgba(220, 127, 127, 0.393) rgba(88, 107, 88, 0.534) rgba(110, 110, 202, 0.68));
            border-radius: 10px;
            display: block;
            text-align: center;
            justify-content: center;
        }
        .card button{
            border-radius: 5px;
            background-color: black;
            color: white;
            width: 80px;
            padding:5px;
            margin-top: 100px;
        }
        .card button:hover{
            background-color: darkgray;
            color: black;
            cursor: pointer;
            
        }
    </style>
</head>
<body>
    <section class="card">
        <div>
            <h1>Welcome</h1>
            <p>This is Html</p>
        </div>
        <button>Click</button>
    </section>
    
</body>
</html>
