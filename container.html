<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Container</title>
    <style>
            body {
                background-color: grey;
                display: flex;
                justify-content: center;
                align-items: center; 
                height: 100vh;
                
            }
    

        .container {
            width: 800px;
            background-color: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.1);
        }

        h1 {
            text-shadow: 2px 2px pink;
        }

        button {
            background-color: blue;
            color: white;
            border:none;
            padding: 8px 16px;
            text-transform: uppercase;
            transition: 0.3s ease;
        }
        button:hover{
            background-color: darkblue;
            color:gray;
           
           
        }
        @media(max-width:820px){
            .container{
                width:90%;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Welcome</h1>
        <p>Lorem ipsum, dolor sit amet consectetur adipisicing elit.
        Voluptatum soluta facilis amet numquam officiis
        tempore quia iure possimus laudantium rerum.</p>
        <button>Login</button>
    </div>

</body>

</html>
