<!DOCTYPE html>
<html lang="en">
<head> 
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adjacent and general Sibling</title>
    <style>
        h1 + p{
            color:blue;
        }
        h2 ~ p{
            color:red;
        }
    </style>
</head>
<body>
    <h1>Title</h1>
    <p>Para 1</p>
    <p>Para 2</p>
    <h2>welcome</h2>
    <p>heloo</p>
    <p>hiii</p>
    <p>heyyy</p>
</body>
</html>
