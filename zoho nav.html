<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zoho Navbar</title>
    <style>
        body {
            background-color: rgba(245, 245, 220, 0.655);
            margin: 0%
        }

        .nav {
            background-color: white;

        }

        img {
            width: 100px;
            margin-left: 2px;
            position: relative;
        }

        ul {
            list-style: none;
            display: flex;
        }

        a {
            text-decoration: none;
            color: black;
            font-family: Arial, Helvetica, sans-serif;
            padding: 8px;
        }

        a:hover {
            color: darkgrey;
            cursor: pointer;

        }

        .search {
            display: flex;
        }

        .search img {
            width: 50px;

        }

        .globe {
            display: flex;
        }

        .globe img {
            width: 19px;
        }

        p {
            font-family: Arial, Helvetica, sans-serif;
            display: flex;
            position: absolute;
            top: 2.5%;
            right: 5.5%;
        }

        .profile {
            display: flex;
        }

        .profile img {
            width: 28px;
        }
    </style>
</head>

<body>
    <nav class="nav">

                <select></select>
            </ul>
        </div>
        <div class="search">
            <img src="C:\Users\Lorina Rogin\Downloads\search.png">
        </div>
        <div class="globe">
            <img src="C:\Users\Lorina Rogin\Downloads\globe.png">

        </div>
        <p>English</p>

        <div class="profile">
            <img src="C:\Users\Lorina Rogin\OneDrive\Pictures\profile nav.jpg">
        </div>
    </nav>
</body>

</html>
