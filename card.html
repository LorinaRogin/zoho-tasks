<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Card</title>
    <style>
        .card {
            width: 250px;
            height: 150px;
            background-color: darkgray;
            position: relative;
        }

        .badge {
            color: red;
            position: absolute;
            top: 0;
            right: 30px;
        }
    </style>
</head>

<body>
    <div class="card">

        <div class="badge">
            <h2>NEW</h2>
        </div>
    </div>
</body>

</html>
