<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width">
    <title>Text Properties</title>
    <style>
        h1 {
            text-shadow: 2px 2px 2px gray;
            text-align: center;
            font-style: italic;
        }

        .indentation {
            text-indent: 50px;
            line-height: 2.5;
            word-spacing: 2px;
        }

        .letter {
            letter-spacing: 2px;
        }

        .upper {
            text-transform: uppercase;
            text-decoration-line: underline;
            text-decoration-color: crimson;

        }

        h1 {
            text-decoration: dotted;
        }

        .lower {
            text-transform: lowercase;
            color: red;
        }

        .capitalize {
            text-transform: capitalize;
        }
    </style>
</head>

<body>
    <h1>Welcome</h1>
    <p class="indentation">
        Lorem ipsum dolor sit amet consectetur adipisicing elit. Modi, alias sequi,
        ipsam porro dolorum a recusandae illo ex nobis, fuga veritatis repellendus
        ea voluptatem voluptates pariatur officia obcaecati deleniti rerum.
    <h1 class="letter">Letter</h1>
    </p>
    <h1 class="upper">a b c</h1>
    <h2 class="lower">APPLE</h2>
    <h3 class="capitalize">Lorem ipsum dolor sit amet.</h3>
</body>

</html>
