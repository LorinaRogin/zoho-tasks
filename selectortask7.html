<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pseudo class selectors</title>
    <style>
        ul li:first-child {
            color: red;
        }

        ul li:last-child {
            color: blue;
        }

        ul li:nth-child(3) {
            color: green;
        }
    </style>
</head>

<body>
    <ul>
        <li>Korea</li>
        <li>Japan</li>
        <li>China</li>
        <li>Dubai</li>
        <li>France</li>
    </ul>
</body>

</html>
