<body>
    <script>
        let arr = [7, 18, 5, 22, 9, 14];
        let max = -Infinity;
        for (let i = 0 ; i < arr.length ; i++){
            if (arr[i] % 2 == 0 && arr[i] > max){
                max = arr[i];
            }
        }
        console.log(max);
    </script>
