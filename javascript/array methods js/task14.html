<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let marks = [35, 80, 45, 90, 25, 60];
        let arr = [];
        for(let i = 0; i < marks.length ; i++){
            if (marks[i] > 50){
                arr.push(marks[i]);
            }
        }
        console.log(arr);

        let numbers = [10, 25, 30, 7, 50, 3];
        let arr1 =[];
        for (let i = 0; i < numbers.length ; i++){
            if (numbers[i] % 5 === 0){
                arr1.push(numbers[i]);
            }
        }
        console.log(arr1);
    </script>
</body>
</html>
