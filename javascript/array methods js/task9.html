<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let numbers = [10, 20, 30, 40];
        let sum = 0;
        for (let i = 0; i < numbers.length ; i++){
            sum = sum + numbers[i];
        }
        console.log("The average of the given numbers are : " , sum/numbers.length);
    </script>
</body>
</html>
