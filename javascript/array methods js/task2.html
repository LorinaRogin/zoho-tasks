<body>
    <script>
        let fruits = ["Apple", "Mango", "Banana"];
        fruits.push("Orange");
        console.log(fruits);
        fruits.pop();
        console.log(fruits);
        fruits.unshift("Pineapple");
        console.log(fruits);
        
    </script>
</body>
