<!DOCTYPE html>
<html lang="en">

<body>
    <script>
        let arr = [10, 3, 25, 8, 14, 1, 30];
        let count = 0;
        for(let i = 0; i < arr.length ; i++){
            if (arr[i] % 2 == 0 && arr[i] > 10){
                count++;
            }
        }
        console.log(count);
    </script>
</body>
