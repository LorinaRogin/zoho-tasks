<body>
    <script>
        let num = [2, 5, 8, 11, 14, 7]
        let count = 0 ; 
        for (let i=0 ; i<num.length ; i++){
            if(num[i] % 2 == 0){
                  count++;
            }
        }
        console.log(count);
    </script>
