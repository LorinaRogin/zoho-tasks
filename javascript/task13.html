<body>
    <script>
        let arr = [4,15,9,22,3,18]
        let count = 0;
        for (let i = 0 ; i < arr.length ; i++){
            if(arr[i] > 10){
                count++;
                console.log(arr[i]);
            }
        }
        console.log("Total numbers greater than 10 is : ", count)
    </script>
