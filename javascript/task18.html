    <script>
        let arr = [3, 14, 7, 25, 10, 6, 19];
        let max = -Infinity;
        for (let i = 0 ; i < arr.length ; i++){
            if (arr[i] % 2 !== 0 && arr[i] > max){
                max = arr[i];
            }
        }
        console.log(max);

    </script>
