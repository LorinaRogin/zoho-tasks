<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <!-- button counter -->
    <button id="counterButton">Click Me</button>
    <p id="counterDisplay">0</p>

    <!-- live typing preview -->
    <input id="liveInput" placeholder="type something...">
    <p id="liveOutput"></p>

    <!-- Character count -->
    <input id="messageInput" placeholder="Type something">
    <p id="charCount">Characters : 0</p>

    <!-- maximum character count -->
    <input id="postInput" placeholder="Write Something...">
    <p id="postCount"> 0 / 20 </p>

    <!-- Password strength checker -->
    <input id="passwordField" placeholder="Enter password">
    <p id="strengthMsg"></p>

    <!-- Dark mode toggle button -->
    <button id="themeToggle">Dark Mode</button>

    <!-- Show / Hide password feature -->
    <input id="loginPassword" placeholder="Enter password" type="password">
    <button id="togglePassword">Show</button>

    <!-- live character count -->
    <textarea id="tweetBox"></textarea>
    <p id="charLeft">Characters left: 100</p>

    <!-- mini like button system -->
    <button id="reactionBtn">👍like</button>
    <p id="reactCount">Likes : 0</p>

    <!-- addEventListener tasks -->
    <button id="mysteryBtn">Press me</button>
    <p id="mysteryMsg">Waiting...</p>

    <!-- classLists -->
    <button id="modeChanger">Toggle Mode</button>
    <p id="modeText">Hello World</p>
    <style>
        .darkMode {
            background: black;
            color: white;
            font-size: 30px;
        }
    </style>


    <script src="task11.js"></script>
</body>

</html>
