<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <!-- onclick practice task -->
    <button id="btn">Click</button>
    <p id="msg">Hello</p>
    <!--  -->
    <button id="colorBtn">Change color</button>
    <p id="text">This is a paragraph</p>

    <!-- ondblclick practice task -->
    <button id="dblBtn">Double Click</button>
    <p id="message">Waiting...</p>
    <!--  -->
    <button id="boxBtn">Double Click</button>
    <p id="box">Box</p>

    <!-- onmouseover practice task -->
    <p id="hoverMessage">Move your mouse here!</p>
    <!--  -->
    <p id="magicText">Hover over this sentence</p>

    <!-- onmouseout practice task -->
    <p id="leaveZone">Move your mouse here then leave</p>

    <!-- onkeydown practice task -->
    <input id="typingField" placeholder="Start typing here">
    <p id="typingStatus"></p>

    <!-- onfocus practice task -->
    <input id="secureInput" placeholder="Enter Password">
    <p id="focusNotice"></p>

    <!-- onblur practice tasks -->
    <input id="emailEntry" placeholder="Enter email">
    <p id="blurMessage"></p>

    <script src="task10.js"></script>



</body>

</html>
