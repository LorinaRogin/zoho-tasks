<body>
    <script>
        let arr = [2, 4, 6, 8];
        let min = Infinity;
        for (let i = 0; i < arr.length; i++) {
            if (arr[i] % 2 !== 0 && arr[i] < min) {
                min = arr[i];
            }
           else if (min === Infinity) {
                console.log("No odd numbers found");
            } else {
                console.log(min);
            }
        }
  
    </script>
</body>

</html>
