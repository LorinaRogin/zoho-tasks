<body>
    <script>
        let arr = [8, 21, 4, 17, 30, 11, 2];
        let min = Infinity;
        for(let i = 0 ; i < arr.length ; i++){
            if (arr[i] % 2 === 0 && arr[i] < min){
                min = arr[i];
            }
        }
        console.log(min);
    </script>
