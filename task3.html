<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Navbar</title>
    <style>
        body {
            margin: 0px;
        }

        .navbar {
            background-color: black;
            padding: 20px;
            display: flex;
            justify-content: flex-end;
        }

        .navbar li {
            text-decoration: none;
            margin-right: 10px;
            display: inline;


        }

        .navbar a {
            color: white;
            text-decoration: none;
        }

        .navbar a:hover {
            color: gray;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <nav class="navbar">
        <ul>
            <li><a href="#">Home</a></li>
            <li><a href="#">About</a></li>
            <li><a href="#">Services</a></li>
            <li><a href="#">Contact</a></li>
        </ul>
    </nav>

</body>

</html>
