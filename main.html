<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            margin: 0%;
            height: 100vh;
            display: flex;
            font-family: Arial, Helvetica, sans-serif;
        }

        .side-bar {
            width: 220px;
            background-color: black;
            padding: 0%;
        }

        ul {
            display: flex;
            color: white;
            flex-direction: column;
            list-style: none;
            gap: 20px;
            
        }
        li{
            padding:5px;
        }

        li:hover {
            background-color: rgb(45, 45, 45);   
        }

        .right-section {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .main {
            flex: 1;
            padding: 20px;
            overflow-y: scroll;
        }

        .header {
            flex:0;
            height: 70px;
            background-color: rgb(241, 235, 235);
            display: flex;
            padding: 0px 20px;
            align-items: center;
            border-bottom: 1px solid #ddd;
        }

        .card-container {
            display: flex;
            flex-wrap: wrap;
            gap: 30px;
            padding:20px;
        }

        .cards {
            flex: 1 1 250px;
            background-color: white;
            box-shadow: 0px 2px 2px rgb(152, 151, 151);
            padding: 20px;
            border-radius: 10px;
            
        }

        .cards:hover {
            box-shadow: 0px 2px 2px rgb(169, 119, 119);

        }
        footer{
            flex:0;
            height:60px;
            background-color: #ddd;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding:15px;
        }
        @media(max-width:915px){
            .cards{
                flex:1 1 100px;
            }
        }
    </style>
</head>

<body>
    <nav class="side-bar">
        <ul>
            <li>Dashboard</li>
            <li>Users</li>
            <li>Settings</li>
        </ul>
    </nav>
    <main class="right-section">
        <div class="header">
            <h2>Header Area</h2>
        </div>
        <div class="main">
            <div class="card-container">
                <div class="cards">Card 1</div>
                <div class="cards">Card 2</div>
                <div class="cards">Card 3</div>
                <div class="cards">Card 4</div>
                <div class="cards">Card 5</div>
                <div class="cards">Card 6</div>
                <div class="cards">Card 1</div>
                <div class="cards">Card 2</div>
                <div class="cards">Card 3</div>
                <div class="cards">Card 4</div>
                <div class="cards">Card 5</div>
                <div class="cards">Card 6</div>
                <div class="cards">Card 1</div>
                <div class="cards">Card 2</div>
                <div class="cards">Card 3</div>
                <div class="cards">Card 4</div>
                <div class="cards">Card 5</div>
                <div class="cards">Card 6</div>
            </div>
        </div>
        <footer>Thankyou</footer>
    </main>
</body>

</html>
