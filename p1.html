<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            margin: 0%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: black;
        }

        .card {
            background-color: white;
            width: 300px;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 1px 2px 15px rgb(250, 247, 247);
        }

        .card h1 {
            text-align: center;
        }

        p {
            text-align: justify;
        }

        button {
            border: none;
            padding: 8px 16px;
            text-transform: uppercase;
            color: white;
            display: block;
            margin: auto;
            background-color: black;

        }

        button:hover {
            background-color: grey;
        }
    </style>
</head>

<body>
    <div class="card">
        <h1>Paris</h1>
        <p>Lorem ipsum dolor, sit amet consectetur adipisicing elit.
           Qui blanditiis natus laboriosam,
           aliquam quod cupiditate a consectetur
           ipsum doloribus incidunt beatae porro tenetur
           provident dolores sapiente explicabo consequatur aut maiores.</p>
        <button>Visit</button>

    </div>
</body>

</html>
