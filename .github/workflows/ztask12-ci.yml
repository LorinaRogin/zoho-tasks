name: ztask12-ci

on:
  push:
    branches: [main]
    paths:
      - "ztask12/**"
      - ".github/workflows/ztask12-ci.yml"
  pull_request:
    paths:
      - "ztask12/**"
      - ".github/workflows/ztask12-ci.yml"

permissions:
  contents: read

jobs:
  build-and-verify:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ztask12
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: npm
          cache-dependency-path: ztask12/package-lock.json

      - name: Install
        run: npm ci

      - name: Generate variables.json (uses PIPELINE_TEST_MESSAGE if set)
        env:
          PIPELINE_TEST_MESSAGE: ${{ vars.PIPELINE_TEST_MESSAGE }}
        run: npm run build:variables

      - name: Verify output exists
        run: node -e "const fs=require('fs'); if(!fs.existsSync('public/variables.json')) { console.error('Missing public/variables.json'); process.exit(1); } console.log('OK: public/variables.json exists');"

      - name: Print CI message found in JSON (if present)
        run: node -e "const fs=require('fs'); const j=JSON.parse(fs.readFileSync('public/variables.json','utf8')); console.log('ci.pipeline_test_message =', j?.ci?.pipeline_test_message ?? '(not set)');"
