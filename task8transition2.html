<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card {
            width: 250px;
            height: 300px;
            background-color: lightseagreen;
            transition: transform 1s ease, background-color 1s ease 1s;
        }

        .card:hover {
            transform: translateY(-100px);
            background-color: darkorchid;
        }

        .text {
            transition: transform 1s ease 2s;
            display: flex;
            height:100%;
            justify-content: center;
            align-items: center;
        }

        .card:hover .text {
            transform: scale(1.4);
        }
    </style>
</head>

<body>
    <div class="card">
        <div class="text">
            HELLO
        </div>
    </div>
</body>

</html>

</html>
